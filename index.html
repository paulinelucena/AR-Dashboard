<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Q1M AR Dashboard - Live</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<style>
  :root {
    --bg-dark: #10193B;
    --card-dark: #1E295D;
    --text-main: #FFFFFF;
    --text-muted: #8E9BB0;
    --accent-blue: #00D2FF;
    --accent-purple: #9D4EDD;
  }
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: var(--bg-dark);
    color: var(--text-main);
  }
  .dashboard-container {
    padding: 20px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .header-panel {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--card-dark);
    padding: 15px 25px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    margin-bottom: 20px;
  }
  .chart-section {
    background: var(--card-dark);
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    margin-bottom: 20px;
    position: relative;
    height: 400px;
  }
  .controls {
    display: flex;
    gap: 10px;
  }
  button {
    background: var(--accent-blue);
    color: #000;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    transition: opacity 0.2s;
  }
  button:hover {
    opacity: 0.9;
  }
</style>
</head>
<body>

<div class="dashboard-container">
  <div class="header-panel">
    <h2>Accounts Receivable Live Trend</h2>
    <div class="controls">
      <button onclick="downloadCompanyReport()">Export Report</button>
      <span id="collectionStatus" style="color: var(--text-muted); font-size: 0.9rem; align-self: center;"></span>
    </div>
  </div>

  <div class="chart-section">
    <canvas id="arTrendChart"></canvas>
  </div>
</div>

<script>
let trendChart = null;

// Mock structured data mimicking the live setup
const initialChartData = {
  labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
  datasets: [{
    label: 'Current AR Balance',
    data: [12000, 19000, 3000, 5000, 2000, 3000],
    borderColor: '#00D2FF',
    backgroundColor: 'rgba(0, 210, 255, 0.1)',
    fill: true,
    tension: 0.4
  }]
};

function initializeChart() {
  const ctx = document.getElementById('arTrendChart').getContext('2d');
  
  trendChart = new Chart(ctx, {
    type: 'line',
    data: initialChartData,
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          labels: {
            color: '#FFFFFF', // Clear white legend labels
            font: { family: 'Segoe UI', size: 12 }
          }
        },
        tooltip: {
          backgroundColor: '#10193B', // Dark theme background for tooltip
          titleColor: '#00D2FF',      // Accent color title
          bodyColor: '#FFFFFF',       // Clean white values
          borderColor: '#1E295D',     // Defined card border 
          borderWidth: 1,
          padding: 10
        }
      },
      scales: {
        x: {
          grid: {
            color: 'rgba(255, 255, 255, 0.08)', // Faded grid lines
            borderColor: 'rgba(255, 255, 255, 0.2)'
          },
          ticks: {
            color: '#8E9BB0', // Clean muted text style for timeline
            font: { family: 'Segoe UI' }
          }
        },
        y: {
          grid: {
            color: 'rgba(255, 255, 255, 0.08)',
            borderColor: 'rgba(255, 255, 255, 0.2)'
          },
          ticks: {
            color: '#8E9BB0',
            font: { family: 'Segoe UI' },
            callback: function(value) { return '$' + value.toLocaleString(); }
          }
        }
      }
    }
  });
}

// Global scope mock functions from the document configuration
function fillLegalSheet(ws, rows) {
  const headerRowIdx = 1;
  const legalColWidths = [20, 15, 15, 15, 15, 15, 12, 15, 30];
  
  const headers = ['Customer', 'Invoice #', 'Invoice Date', 'Due Date', 'Rep', 'Amount', 'Days Overdue', 'Ref Num', 'Notes'];
  headers.forEach((h, i) => {
    const c = ws.getCell(headerRowIdx, i+1);
    c.value = h;
    c.font = { name:'Arial', bold:true, size:11, color:{argb:'FFFFFFFF'} };
    c.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FF10193B'} };
    c.alignment = { horizontal:'center' };
  });

  rows.forEach((r, idx) => {
    const rowIdx = headerRowIdx + 1 + idx;
    const values = [r.customer, r.invoice_num, r.invoice_date, r.date_due, r.rep, r.amount, r.days_overdue, r.ref_num, r.notes];
    values.forEach((v, i) => {
      const c = ws.getCell(rowIdx, i+1);
      c.value = v;
      c.font = { name:'Arial', size:10 };
      if (i === 5) c.numFmt = '$#,##0.00';
      if (i === 6) c.alignment = { horizontal:'center' };
    });
  });

  ws.columns = legalColWidths.map(w => ({ width: w }));
  ws.views = [{ state:'frozen', ySplit: headerRowIdx }];
}

async function downloadCompanyReport() {
  const statusEl = document.getElementById('collectionStatus');
  statusEl.textContent = 'Building company-wide report...';
  
  const wb = new ExcelJS.Workbook();
  const ws2 = wb.addWorksheet('Legal');
  
  // Empty array mock to run logic
  fillLegalSheet(ws2, []);
  
  statusEl.textContent = 'Report ready for download.';
}

window.onload = function() {
  initializeChart();
};
</script>
</body>
</html>
